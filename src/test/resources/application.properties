# 테스트용 H2 in-memory DB 설정 (CI/로컬 테스트 모두 사용)
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb;MODE=MySQL}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# DART API (테스트용 더미)
dart.api.key=${DART_API_KEY:test-key}
dart.api.base-url=https://opendart.fss.or.kr/api

# Quartz
spring.quartz.job-store-type=memory
spring.quartz.auto-startup=false

# 로깅
logging.level.com.jusin=WARN
