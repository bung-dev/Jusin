# 테스트용 H2 in-memory DB 설정 (CI/로컬 테스트 모두 사용)
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb;MODE=MySQL}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# schema.sql은 MySQL 전용 구문을 포함하므로 H2 테스트 환경에서 실행하지 않음
# ddl-auto=create-drop으로 Hibernate가 스키마를 자동 생성함
spring.sql.init.mode=never

# DART API (테스트용 더미)
dart.api.key=${DART_API_KEY:test-key}
dart.api.base-url=https://opendart.fss.or.kr/api

# Quartz
spring.quartz.job-store-type=memory
spring.quartz.auto-startup=false

# JWT (테스트용 - 256bit Base64 인코딩 키)
jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci1qdW5pdC10ZXN0cy0yNTZiaXQtbG9uZy1rZXk=
jwt.access-token-expiry-ms=3600000
jwt.refresh-token-expiry-ms=604800000

# 로깅
logging.level.com.jusin=WARN
